<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Nata Chat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./main.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/app.js"></script>
</head>
    <body>
        <aside class="w-[40%] h-screen flex items-center justify-center fixed bg-[#5E5BE5]">
            <div class="w-[80%] h-[85%] flex flex-col items-end justify-between pl-8 mr-auto">
                <h2 class="text-4xl text-white leading-[3rem]">
                    O Nata Chat permite que você se comunique  de forma fácil, rápida e divertida.
                </h1>

                <img src="./assets/icon.svg" alt="" class="w-[75%] h-[50%] icon-login mx-auto">
            </div>
        </aside>

        <main class="w-[65%] h-screen flex items-center justify-center ml-auto rounded-l-2xl bg-[#333] z-50 relative">
            <secton class="w-[80%] h-[85%] text-white flex flex-col items-start justify-between">
                <header class="w-full h-auto flex flex-col items-start justify-start gap-4 py-2">
                    <h1 class="text-5xl font-bold">Registre-se</h1>
                    <span class="text-xl">Já tem conta? 
                        <a href="" class="text-[#0AA6FB] hover:text-[#a9a8e8] cursor-pointer transition-colors">
                            Vá para o Login
                        </a>
                    </span>
                </header>

                <form action="" class="w-4/5 h-auto">
                    <div class="w-full h-auto flex flex-col gap-2">
                        <span class="text-base font-bold">Nome</span>

                        <div class="w-full h-auto border border-[#0AA6FB] rounded-lg">
                            <input type="text" class="w-full h-full outline-none rounded-lg px-4 py-2">
                        </div>
                    </div>
                </form>

                <div class=""></div>
            </secton>
        </main>
    </body>
</html>
