<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Nata Chat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./main.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./app.js"></script>
</head>
    <body>
        <aside class="w-[40%] h-screen flex items-center justify-center fixed bg-[#5E5BE5]">
            <div class="w-[80%] h-[85%] flex flex-col items-end justify-between pl-8 mr-auto">
                <h2 class="text-4xl text-white leading-[3rem]">
                    O Nata Chat permite que você se comunique  de forma fácil, rápida e divertida.
                </h1>

                <img src="./assets/icon.svg" alt="" class="w-[75%] h-[50%] icon-login mx-auto">
            </div>
        </aside>

        <main class="w-[65%] h-screen flex items-center justify-center ml-auto rounded-l-2xl bg-[#333] z-50 relative">
            <secton class="w-[80%] h-[85%] text-white flex flex-col items-start justify-between">
                <header class="w-full h-auto flex flex-col items-start justify-start gap-4 py-2">
                    <h1 class="text-5xl font-bold">Registre-se</h1>
                    <span class="text-xl">Já tem conta? 
                        <a href="" class="text-[#0AA6FB] hover:text-[#a9a8e8] cursor-pointer transition-colors">
                            Vá para o Login
                        </a>
                    </span>
                </header>

                <form action="" class="w-8/12 h-auto flex flex-col gap-6">
                    <div class="w-full h-auto flex flex-col gap-2">
                        <span class="text-base font-bold">Nome</span>

                        <input 
                            name="name" 
                            id="name" 
                            type="text" 
                            class="w-full h-full border-2 border-[#0AA6FB] outline-none rounded-lg text-black px-2 py-2"
                            placeholder="Digite seu nome"
                            required
                        >
                    </div>

                    <div class="w-full h-auto flex flex-col gap-2">
                        <span class="text-base font-bold">E-mail</span>

                        <input 
                            name="email" 
                            id="email" 
                            type="email" 
                            class="w-full h-full border-2 border-[#0AA6FB] outline-none rounded-lg text-black px-4 py-2"
                            placeholder="Digite seu e-mail"
                            required
                        >
                    </div>

                    <div class="w-full h-auto flex flex-col gap-2">
                        <span class="text-base font-bold">Senha</span>

                        <input 
                            name="password" 
                            id="password" 
                            type="password" 
                            class="w-full h-full border-2 border-[#0AA6FB] outline-none rounded-lg text-black px-2 py-2"
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>

                    <div class="w-full h-auto flex items-center justify-start">
                        <button class="w-auto h-auto border border border-[#a9a8e8] text-[#a9a8e8] px-8 py-2 rounded-lg hover:bg-[#a9a8e8] hover:text-white transition-all">
                            Cadastrar
                        </button>
                    </div>
                </form>

                <div class=""></div>
            </secton>
        </main>
    </body>
</html>
